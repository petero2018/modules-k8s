files: (?x)^(.*)$
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
    - id: trailing-whitespace
    - id: end-of-file-fixer
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.87.1
    hooks:
    - id: terraform_fmt
      args:
        - --args=-diff
    - id: terraform_checkov
      args:
        - --args=--quiet
        - --args=--config-file=__GIT_WORKING_DIR__/checkov_config.yml
    - id: terraform_tflint
      args:
        - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl
    - id: terraform_docs
      args:
        - --hook-config=--path-to-file=README.md
        - --hook-config=--add-to-existing-file=true
        - --hook-config=--create-file-if-not-exist=true
  - repo: local
    hooks:
    - id: verify-module
      name: Check module list in README
      description: Checks if module list is up to date and appends if not
      entry: current_module_list.sh
      language: script
  - repo: local
    hooks:
    - id: validate-terraform
      name: Check terraform versions
      files: '.*\.tf'
      require_serial: true
      description: Checks if the module works with the specified terraform versions
      entry: validate-terraform.sh
      language: script
