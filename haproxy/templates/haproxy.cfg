global
  log stdout daemon info

defaults
  log  global
  mode http

  option httplog
  option dontlognull
  option abortonclose
  option redispatch

  retries 1

  timeout connect 1000
  timeout client  50000
  timeout server  50000

listen stats
  bind *:8000
  mode http
  stats enable
  stats uri /stats

frontend default
  bind *:8080
  mode http

  http-request return status 200 if { path "/health" }

  default_backend default

backend default
  mode http

  server default ${backend}
